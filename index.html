<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd1dc, #fff0f5);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      max-width: 650px;
      padding: 35px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 15px;
    }

    img {
      width: 150px;
      border-radius: 15px;
      margin: 10px;
    }

    #message {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hello LOML ❤️</h1>

    <p>
      I know you're upset about how your haircut has turned out,
      but I hope you realize that you are just as pretty to me as you were before this and 
      I still see the prettiest angry girl in that picture and I love you just the same
    </p>

    <button onclick="showMessage()">
      Click for a reminder ✨
    </button>

    <p id="message"></p>
  </div>

  <script>
    const messages = [
      "You're beautiful. No matter what. Period 💅🏼",
      "DAYUMMMM GURLLLLLL💅🏼",
      "People would die for hair like yours🫪",
      "Hair grows. You're still gorgeous.❤️",
      "I'm still crushing on you.🫠",
      "You're my favorite person.🫶🏼"
    ];

    function showMessage() {
      const random =
        messages[Math.floor(Math.random() * messages.length)];

      document.getElementById("message").innerText = random;
    }
  </script>

</body>
</html>
